name: NetHunter ath9k_htc - Realme C51 RMX3830

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  GKI_TAG: android13-5.15.178_r00
  GKI_REPO: https://android.googlesource.com/kernel/common
  STOCK_MODULES: stock_modules.tgz
  STOCK_CFG80211: cfg80211.ko

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout device artifacts
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex libssl-dev make build-essential gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libncurses-dev libelf-dev dwarves kmod python3 zip unzip cpio rsync curl device-tree-compiler

      - name: Reconstruct Module.symvers from stock modules
        run: |
          if [ ! -f "${STOCK_MODULES}" ]; then
            echo "No stock_modules.tgz"
            exit 0
          fi
          mkdir -p stock_ko
          tar -xzf "${STOCK_MODULES}" -C stock_ko || true
          echo "=== Stock vermagic ==="
          modinfo "${STOCK_CFG80211}" | grep vermagic || true
          echo "=== Reconstructing Module.symvers from all stock .ko files ==="
          cat > /tmp/extract_symvers.py << 'PYEOF'
import subprocess, sys, os, re

ko_files = []
for root, dirs, files in os.walk(sys.argv[1]):
    for f in files:
        if f.endswith('.ko'):
            ko_files.append(os.path.join(root, f))

print(f"Found {len(ko_files)} stock .ko files", file=sys.stderr)

symvers = {}
for ko in ko_files:
    try:
        result = subprocess.run(
            ['modprobe', '--dump-modversions', ko],
            capture_output=True, text=True
        )
        for line in result.stdout.splitlines():
            parts = line.strip().split()
            if len(parts) == 2:
                crc, sym = parts
                symvers[sym] = crc
    except Exception as e:
        pass

print(f"Total unique symbols: {len(symvers)}", file=sys.stderr)
for sym, crc in sorted(symvers.items()):
    print(f"{crc}\t{sym}\t(unknown)\tEXPORT_SYMBOL")
PYEOF
          python3 /tmp/extract_symvers.py stock_ko > Module.symvers
          wc -l Module.symvers
          echo "=== Sample entries ==="
          grep "module_layout" Module.symvers || echo "module_layout not found in stock modules"
          head -5 Module.symvers

      - name: Clone GKI source
        run: |
          rm -rf kernel
          git clone --depth=1 -b "${GKI_TAG}" "${GKI_REPO}" kernel || git clone --depth=1 -b android13-5.15 "${GKI_REPO}" kernel
          head -5 kernel/Makefile

      - name: Clone Clang toolchain
        run: |
          git clone --depth=1 -b 14 https://gitlab.com/ThankYouMario/android_prebuilts_clang-standalone/ clang
          echo "$(pwd)/clang/bin" >> "$GITHUB_PATH"

      - name: Fetch firmware
        run: |
          mkdir -p tools fw
          curl -L -o tools/magiskboot https://github.com/topjohnwu/Magisk/releases/latest/download/magiskboot || true
          chmod +x tools/magiskboot || true
          curl -L -o fw/htc_9271.fw https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/ath9k_htc/htc_9271-1.4.0.fw || curl -L -o fw/htc_9271.fw https://raw.githubusercontent.com/wkennington/linux-firmware/master/ath9k_htc/htc_9271.fw || true

      - name: Write kernel config additions
        run: |
          printf 'CONFIG_MODULES=y\nCONFIG_MODVERSIONS=y\nCONFIG_MODULE_UNLOAD=y\nCONFIG_MODULE_FORCE_UNLOAD=y\nCONFIG_MODULE_SIG=n\nCONFIG_MODULE_SIG_FORCE=n\nCONFIG_MODULE_SIG_ALL=n\nCONFIG_CFG80211=m\nCONFIG_CFG80211_WEXT=y\nCONFIG_MAC80211=m\nCONFIG_MAC80211_HAS_RC=y\nCONFIG_MAC80211_MESH=y\nCONFIG_WLAN=y\nCONFIG_WLAN_VENDOR_ATH=y\nCONFIG_ATH_COMMON=m\nCONFIG_ATH9K_HW=m\nCONFIG_ATH9K_COMMON=m\nCONFIG_ATH9K_HTC=m\nCONFIG_USB_USBNET=y\nCONFIG_USB_NET_CDCETHER=y\nCONFIG_FW_LOADER_USER_HELPER=y\n' > /tmp/nethunter_additions.config

      - name: Configure kernel
        working-directory: kernel
        run: |
          set -e
          export ARCH=arm64 SUBARCH=arm64
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          mkdir -p out
          make O=out ARCH=arm64 gki_defconfig
          cat /tmp/nethunter_additions.config >> out/.config
          make O=out ARCH=arm64 olddefconfig
          grep -E "MODVERSIONS|ATH9K_HTC|CFG80211" out/.config || true
          cp "$GITHUB_WORKSPACE/Module.symvers" out/Module.symvers || true
          echo "=== Module.symvers copied to build ==="
          wc -l out/Module.symvers || true

      - name: Build modules against stock symvers
        working-directory: kernel
        run: |
          set -eo pipefail
          export ARCH=arm64 SUBARCH=arm64
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CLANG_TRIPLE=aarch64-linux-gnu- KCFLAGS="-Wno-error" -j"$(nproc)" modules 2>&1 | tee ../build.log
          echo "=== Built modules ==="
          find out -name '*.ko' | head -20

      - name: Check module_layout CRC
        run: |
          BUILT_KO=$(find kernel/out -name 'ath9k_htc.ko' | head -n1)
          if [ -z "$BUILT_KO" ]; then exit 0; fi
          modprobe --dump-modversions "$BUILT_KO" | sort > built_symvers.txt || true
          BUILT_ML=$(grep "module_layout" built_symvers.txt | awk '{print $1}')
          STOCK_ML=$(grep "module_layout" Module.symvers | awk '{print $1}')
          echo "Built module_layout CRC : $BUILT_ML"
          echo "Stock module_layout CRC : $STOCK_ML"
          if [ "$BUILT_ML" = "$STOCK_ML" ]; then
            echo "MATCH - modules should load"
          else
            echo "MISMATCH - will not load"
          fi
          MISMATCH=0
          while read -r crc sym rest; do
            bcrc=$(grep -E "^[^\t]+\t${sym}\t" built_symvers.txt | awk '{print $1}' | head -n1)
            if [ -n "$bcrc" ] && [ "$bcrc" != "$crc" ]; then
              echo "MISMATCH: $sym stock=$crc built=$bcrc"
              MISMATCH=1
            fi
          done < Module.symvers
          if [ "$MISMATCH" = "0" ]; then
            echo "ALL SHARED CRCs MATCH"
          fi

      - name: Package artifact
        if: always()
        run: |
          set -e
          DATE=$(date +%Y%m%d)
          OUT="nethunter-rmx3830-${DATE}"
          mkdir -p "pkg/${OUT}/modules" "pkg/${OUT}/firmware"
          find kernel/out -name '*.ko' -exec cp {} "pkg/${OUT}/modules/" \; 2>/dev/null || true
          cp fw/htc_9271.fw "pkg/${OUT}/firmware/" 2>/dev/null || true
          cp tools/magiskboot "pkg/${OUT}/" 2>/dev/null || true
          cp build.log "pkg/${OUT}/" 2>/dev/null || true
          cp Module.symvers built_symvers.txt "pkg/${OUT}/" 2>/dev/null || true
          printf '#!/system/bin/sh\nset -e\ncd "$(dirname "$0")"\ncp firmware/htc_9271.fw /vendor/firmware/ 2>/dev/null || cp firmware/htc_9271.fw /lib/firmware/ 2>/dev/null || true\ninsmod modules/cfg80211.ko 2>/dev/null || true\ninsmod modules/mac80211.ko 2>/dev/null || true\ninsmod modules/ath.ko 2>/dev/null || true\ninsmod modules/ath9k_hw.ko 2>/dev/null || true\ninsmod modules/ath9k_common.ko 2>/dev/null || true\ninsmod modules/ath9k_htc.ko\necho "[+] Done. Plug AR9271 and check: dmesg | grep ath9k"\n' > "pkg/${OUT}/install_modules.sh"
          chmod +x "pkg/${OUT}/install_modules.sh"
          printf 'NetHunter ath9k_htc - Realme C51 RMX3830\nStock kernel: 5.15.178-android13-8-ge7eb24fc4398-ab516\n\nRECOMMENDED:\n  adb push this folder /data/local/tmp/\n  adb shell su -c "sh /data/local/tmp/%s/install_modules.sh"\n  Plug AR9271: dmesg | grep ath9k\n' "${OUT}" > "pkg/${OUT}/README.txt"
          ( cd pkg && zip -r "${OUT}.zip" "${OUT}" )
          ls -lh "pkg/${OUT}.zip"
          echo "ZIP_NAME=${OUT}.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nethunter-rmx3830
          path: pkg/${{ env.ZIP_NAME }}
          retention-days: 7