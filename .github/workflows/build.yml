name: Build NetHunter WiFi Modules - Realme C51

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Checkout Realme repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: realme-src

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git bc bison flex libssl-dev \
            make gcc build-essential \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libncurses-dev libelf-dev \
            python3 zip unzip cpio wget \
            dwarves device-tree-compiler kmod

      - name: Clone Clang toolchain
        run: |
          git clone --depth=1 -b 14 \
            https://gitlab.com/ThankYouMario/android_prebuilts_clang-standalone/ clang
          clang/bin/clang --version | head -2

      - name: Clone AOSP GKI 5.15 kernel
        run: |
          git clone --depth=1 -b android13-5.15 \
            https://android.googlesource.com/kernel/common kernel

          cd kernel
          echo "=== Kernel version from Makefile ==="
          head -5 Makefile

          # Force SUBLEVEL to 178 to match stock
          SUBLEVEL=$(grep '^SUBLEVEL' Makefile | head -1 | awk '{print $3}')
          if [ "$SUBLEVEL" != "178" ]; then
            echo "Forcing SUBLEVEL to 178"
            sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 178/' Makefile
          fi
          head -5 Makefile

      - name: Configure kernel to match stock
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

          # Start with gki_defconfig
          make ARCH=arm64 O=out gki_defconfig

          # Apply Unisoc fragment
          python3 << 'PYEOF'
          import os
          fragment_path = "$GITHUB_WORKSPACE/realme-src/Documentation/sprd-gki-diff-config"
          output_path = "/tmp/unisoc_fragment.config"
          if not os.path.exists(fragment_path):
              fragment_path = os.environ.get("GITHUB_WORKSPACE", ".") + "/realme-src/Documentation/sprd-gki-diff-config"
          if not os.path.exists(fragment_path):
              print("WARNING: sprd-gki-diff-config not found")
              open(output_path, 'w').close()
              exit(0)
          adds, mods, dels = [], [], []
          with open(fragment_path) as f:
              for line in f:
                  line = line.strip()
                  if not line: continue
                  if line.startswith("ADD:"): adds.append(f"{line[4:]}=y")
                  elif line.startswith("MOD:"): mods.append(f"{line[4:]}=m")
                  elif line.startswith("DEL:"): dels.append(f"# {line[4:]} is not set")
          with open(output_path, 'w') as f:
              for x in dels + adds + mods: f.write(x + "\n")
          print(f"Fragment: {len(adds)} ADD + {len(mods)} MOD + {len(dels)} DEL")
          PYEOF

          # Append Unisoc fragment
          if [ -s /tmp/unisoc_fragment.config ]; then
            cat /tmp/unisoc_fragment.config >> out/.config
          fi

          # Append WiFi/ath9k config — BUILD AS MODULES (=m)
          cat >> out/.config << 'EOF'
          CONFIG_WIRELESS=y
          CONFIG_WLAN=y
          CONFIG_CFG80211=m
          CONFIG_CFG80211_WEXT=y
          CONFIG_CFG80211_DEFAULT_PS=y
          CONFIG_MAC80211=m
          CONFIG_MAC80211_HAS_RC=y
          CONFIG_MAC80211_RC_MINSTREL=y
          CONFIG_MAC80211_MESH=y
          CONFIG_WLAN_VENDOR_ATH=y
          CONFIG_ATH_COMMON=m
          CONFIG_ATH9K_HW=m
          CONFIG_ATH9K_COMMON=m
          CONFIG_ATH9K_HTC=m
          CONFIG_ATH9K_BTCOEX_SUPPORT=y
          CONFIG_USB=y
          CONFIG_USB_USBNET=m
          CONFIG_FW_LOADER=y
          CONFIG_FW_LOADER_USER_HELPER=y
          CONFIG_FW_LOADER_USER_HELPER_FALLBACK=y
          CONFIG_MODULES=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_MODULE_FORCE_LOAD=y
          CONFIG_MODVERSIONS=y
          CONFIG_SMP=y
          CONFIG_PREEMPT=y
          CONFIG_LOCALVERSION="-android13-8-ge7eb24fc4398-ab516"
          CONFIG_LOCALVERSION_AUTO=n
          # Disable KASAN to avoid __asan_* symbol deps
          # CONFIG_KASAN is not set
          # CONFIG_KASAN_GENERIC is not set
          # CONFIG_KASAN_SW_TAGS is not set
          EOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' out/.config

          # Resolve dependencies
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            olddefconfig

          echo "=== Config check ==="
          grep "CONFIG_ATH9K_HTC" out/.config
          grep "CONFIG_CFG80211" out/.config | head -3
          grep "CONFIG_LOCALVERSION=" out/.config
          grep "CONFIG_MODVERSIONS" out/.config

      - name: Patch mac80211 and cfg80211 to implement missing wiphy work helpers locally
        run: |
          cd kernel
          python3 -c "
          import os, re

          # 1. Patch net/mac80211/main.c to define the helpers
          main_c_path = 'net/mac80211/main.c'
          if os.path.exists(main_c_path):
              print('Patching net/mac80211/main.c...')
              with open(main_c_path, 'a') as f:
                  f.write('''

          /* NetHunter: Implement missing wiphy work/delayed-work helpers locally */
          #include <net/cfg80211.h>
          #include <linux/workqueue.h>
          #include <linux/slab.h>

          struct mac80211_wiphy_work_wrapper {
              struct work_struct work;
              struct wiphy *wiphy;
              struct wiphy_work *wiphy_work;
          };

          struct mac80211_wiphy_delayed_work_wrapper {
              struct delayed_work dwork;
              struct wiphy *wiphy;
              struct wiphy_delayed_work *wiphy_dwork;
          };

          static void mac80211_wiphy_work_func(struct work_struct *work)
          {
              struct mac80211_wiphy_work_wrapper *wrapper = 
                  container_of(work, struct mac80211_wiphy_work_wrapper, work);
              struct wiphy_work *wiphy_work = wrapper->wiphy_work;
              
              if (wiphy_work) {
                  wiphy_work->entry.next = NULL;
                  if (wiphy_work->func)
                      wiphy_work->func(wrapper->wiphy, wiphy_work);
              }
              kfree(wrapper);
          }

          void wiphy_work_queue(struct wiphy *wiphy, struct wiphy_work *work)
          {
              struct mac80211_wiphy_work_wrapper *wrapper;
              
              if (work->entry.next)
                  return;
                  
              wrapper = kmalloc(sizeof(*wrapper), GFP_ATOMIC);
              if (!wrapper)
                  return;
                  
              wrapper->wiphy = wiphy;
              wrapper->wiphy_work = work;
              INIT_WORK(&wrapper->work, mac80211_wiphy_work_func);
              
              work->entry.next = (struct list_head *)wrapper;
              schedule_work(&wrapper->work);
          }
          EXPORT_SYMBOL(wiphy_work_queue);

          void wiphy_work_cancel(struct wiphy *wiphy, struct wiphy_work *work)
          {
              struct mac80211_wiphy_work_wrapper *wrapper = 
                  (struct mac80211_wiphy_work_wrapper *)work->entry.next;
                  
              if (wrapper) {
                  if (cancel_work_sync(&wrapper->work)) {
                      kfree(wrapper);
                  }
                  work->entry.next = NULL;
              }
          }
          EXPORT_SYMBOL(wiphy_work_cancel);

          static void mac80211_wiphy_delayed_work_func(struct work_struct *work)
          {
              struct mac80211_wiphy_delayed_work_wrapper *wrapper = 
                  container_of(to_delayed_work(work), struct mac80211_wiphy_delayed_work_wrapper, dwork);
              struct wiphy_delayed_work *wiphy_dwork = wrapper->wiphy_dwork;
              
              if (wiphy_dwork) {
                  wiphy_dwork->work.entry.next = NULL;
                  if (wiphy_dwork->work.func)
                      wiphy_dwork->work.func(wrapper->wiphy, &wiphy_dwork->work);
              }
              kfree(wrapper);
          }

          void wiphy_delayed_work_queue(struct wiphy *wiphy, struct wiphy_delayed_work *dwork, unsigned long delay)
          {
              struct mac80211_wiphy_delayed_work_wrapper *wrapper;
              
              if (dwork->work.entry.next)
                  return;
                  
              wrapper = kmalloc(sizeof(*wrapper), GFP_ATOMIC);
              if (!wrapper)
                  return;
                  
              wrapper->wiphy = wiphy;
              wrapper->wiphy_dwork = dwork;
              INIT_DELAYED_WORK(&wrapper->dwork, mac80211_wiphy_delayed_work_func);
              
              dwork->work.entry.next = (struct list_head *)wrapper;
              schedule_delayed_work(&wrapper->dwork, delay);
          }
          EXPORT_SYMBOL(wiphy_delayed_work_queue);

          void wiphy_delayed_work_cancel(struct wiphy *wiphy, struct wiphy_delayed_work *dwork)
          {
              struct mac80211_wiphy_delayed_work_wrapper *wrapper = 
                  (struct mac80211_wiphy_delayed_work_wrapper *)dwork->work.entry.next;
                  
              if (wrapper) {
                  if (cancel_delayed_work_sync(&wrapper->dwork)) {
                      kfree(wrapper);
                  }
                  dwork->work.entry.next = NULL;
              }
          }
          EXPORT_SYMBOL(wiphy_delayed_work_cancel);

          void wiphy_delayed_work_timer(struct timer_list *t)
          {
              /* Dummy stub */
          }
          EXPORT_SYMBOL(wiphy_delayed_work_timer);
          ''')
              print('SUCCESS: Patched net/mac80211/main.c')
          else:
              print('ERROR: net/mac80211/main.c not found!')
              exit(1)

          # 2. Patch net/wireless/core.c to remove duplicate exports
          core_c_path = 'net/wireless/core.c'
          if os.path.exists(core_c_path):
              print('Patching net/wireless/core.c...')
              with open(core_c_path, 'r') as f:
                  content = f.read()
              
              # Remove EXPORT_SYMBOL(...) lines for these functions
              exports_to_remove = [
                  r'EXPORT_SYMBOL\s*\(\s*wiphy_work_queue\s*\)\s*;',
                  r'EXPORT_SYMBOL\s*\(\s*wiphy_work_cancel\s*\)\s*;',
                  r'EXPORT_SYMBOL\s*\(\s*wiphy_delayed_work_queue\s*\)\s*;',
                  r'EXPORT_SYMBOL\s*\(\s*wiphy_delayed_work_cancel\s*\)\s*;',
                  r'EXPORT_SYMBOL\s*\(\s*wiphy_delayed_work_timer\s*\)\s*;'
              ]
              
              original_len = len(content)
              for pattern in exports_to_remove:
                  content = re.sub(pattern, '/* Removed by NetHunter */', content)
              
              if len(content) != original_len:
                  with open(core_c_path, 'w') as f:
                      f.write(content)
                  print('SUCCESS: Removed duplicate exports from net/wireless/core.c')
              else:
                  print('WARNING: No duplicate exports found or already removed')
          else:
              print('WARNING: net/wireless/core.c not found')
          "

      - name: Inject stock Module.symvers for CRC matching
        run: |
          cd kernel

          # Start with the Module.symvers from the repo (extracted from stock modules)
          cp $GITHUB_WORKSPACE/realme-src/Module.symvers out/Module.symvers
          echo "=== Base Module.symvers: $(wc -l < out/Module.symvers) entries ==="

          # Extract additional CRCs from stock modules
          if [ -f "$GITHUB_WORKSPACE/realme-src/stock_modules.tar.gz" ]; then
            mkdir -p /tmp/stock_modules
            tar xzf "$GITHUB_WORKSPACE/realme-src/stock_modules.tar.gz" -C /tmp/stock_modules/
            echo "=== Stock modules extracted: $(find /tmp/stock_modules -name '*.ko' | wc -l) ==="

            # Extract __versions CRCs from each stock module using modinfo/objdump
            python3 << 'PYEOF'
          import struct, os, glob

          def parse_elf_versions(filepath):
              crc_map = {}
              with open(filepath, 'rb') as f:
                  data = f.read()
              if data[:4] != b'\x7fELF':
                  return crc_map
              e_shoff = struct.unpack('<Q', data[40:48])[0]
              e_shentsize = struct.unpack('<H', data[58:60])[0]
              e_shnum = struct.unpack('<H', data[60:62])[0]
              e_shstrndx = struct.unpack('<H', data[62:64])[0]
              shstr_offset = e_shoff + e_shstrndx * e_shentsize
              shstr_sh_offset = struct.unpack('<Q', data[shstr_offset+24:shstr_offset+32])[0]
              shstr_sh_size = struct.unpack('<Q', data[shstr_offset+32:shstr_offset+40])[0]
              shstrtab = data[shstr_sh_offset:shstr_sh_offset+shstr_sh_size]
              for i in range(e_shnum):
                  sh_offset = e_shoff + i * e_shentsize
                  sh_name_idx = struct.unpack('<I', data[sh_offset:sh_offset+4])[0]
                  name_end = shstrtab.find(b'\x00', sh_name_idx)
                  section_name = shstrtab[sh_name_idx:name_end].decode('ascii', errors='ignore')
                  if section_name == '__versions':
                      sh_sec_offset = struct.unpack('<Q', data[sh_offset+24:sh_offset+32])[0]
                      sh_sec_size = struct.unpack('<Q', data[sh_offset+32:sh_offset+40])[0]
                      entry_size = 64
                      for j in range(0, sh_sec_size - entry_size + 1, entry_size):
                          pos = sh_sec_offset + j
                          crc = struct.unpack('<I', data[pos:pos+4])[0]
                          name_bytes = data[pos+8:pos+entry_size]
                          null_idx = name_bytes.find(b'\x00')
                          if null_idx > 0 and crc != 0:
                              name = name_bytes[:null_idx].decode('ascii', errors='ignore')
                              if name and all(c.isalnum() or c == '_' for c in name):
                                  crc_map[name] = crc
                      break
              return crc_map

          # Read existing Module.symvers
          existing = {}
          with open('out/Module.symvers') as f:
              for line in f:
                  parts = line.strip().split('\t')
                  if len(parts) >= 2:
                      existing[parts[1]] = parts[0]

          # Extract from all stock modules
          all_crcs = {}
          for ko in glob.glob('/tmp/stock_modules/*.ko'):
              crcs = parse_elf_versions(ko)
              for sym, crc in crcs.items():
                  all_crcs[sym] = f'0x{crc:08x}'

          # Merge: stock module CRCs override
          for sym, crc in all_crcs.items():
              existing[sym] = crc

          # Write merged Module.symvers
          with open('out/Module.symvers', 'w') as f:
              for name in sorted(existing.keys()):
                  f.write(f'{existing[name]}\t{name}\tvmlinux\tEXPORT_SYMBOL_GPL\n')

          print(f'Final Module.symvers: {len(existing)} entries')
          PYEOF
          fi

          echo "=== Final Module.symvers: $(wc -l < out/Module.symvers) entries ==="

      - name: Patch check_version for CRC bypass
        run: |
          cd kernel
          python3 << 'PYEOF'
          import re
          with open('kernel/module.c', 'r') as f:
              content = f.read()
          pattern = r'(static int check_version\([^{]+\{)'
          match = re.search(pattern, content, re.DOTALL)
          if match:
              pos = match.end()
              content = content[:pos] + '\n\treturn 1; /* CRC bypass */' + content[pos:]
              with open('kernel/module.c', 'w') as f:
                  f.write(content)
              print('SUCCESS: Patched check_version()')
          else:
              print('ERROR: check_version() not found!')
              exit(1)
          PYEOF
          grep -n "return 1.*CRC bypass" kernel/module.c

      - name: Prevent git version suffix
        run: echo "" > kernel/.scmversion

      - name: Build WiFi modules
        timeout-minutes: 60
        run: |
          set -o pipefail
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

          echo "=== Building modules ==="
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            LOCALVERSION="" \
            KCFLAGS="-Wno-error" \
            -j$(nproc) \
            modules 2>&1 | tee build.log

          echo ""
          echo "=== Built modules ==="
          find out/ -name "*.ko" | sort
          echo "Total: $(find out/ -name '*.ko' | wc -l) modules"

      - name: Verify WiFi modules
        run: |
          cd kernel
          echo "=== WiFi module check ==="
          for mod in ath9k_htc ath9k_common ath9k_hw ath_common cfg80211 mac80211; do
            f=$(find out/ -name "${mod}.ko" 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              echo "FOUND: $f ($(stat -c%s "$f") bytes)"
              modinfo "$f" 2>/dev/null | grep -E "vermagic|depends" || true
            else
              echo "MISSING: ${mod}.ko"
            fi
          done

      - name: Download AR9271 firmware
        run: |
          mkdir -p artifact/firmware/ath9k_htc
          wget -q "https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/ath9k_htc/htc_9271-1.4.0.fw" \
            -O artifact/firmware/ath9k_htc/htc_9271-1.4.0.fw || \
          curl -sfL "https://raw.githubusercontent.com/endlessm/linux-firmware/master/ath9k_htc/htc_9271-1.4.0.fw" \
            -o artifact/firmware/ath9k_htc/htc_9271-1.4.0.fw || \
          echo "WARNING: Firmware download failed"

      - name: Package modules
        run: |
          cd kernel
          mkdir -p $GITHUB_WORKSPACE/artifact/modules

          # Copy WiFi-related modules
          for mod in ath9k_htc ath9k_common ath9k_hw ath_common cfg80211 mac80211 compat; do
            f=$(find out/ -name "${mod}.ko" 2>/dev/null | head -1)
            if [ -n "$f" ]; then
              cp "$f" $GITHUB_WORKSPACE/artifact/modules/
            fi
          done

          # Also copy ALL modules for reference
          mkdir -p $GITHUB_WORKSPACE/artifact/all_modules
          find out/ -name "*.ko" -exec cp {} $GITHUB_WORKSPACE/artifact/all_modules/ \;

          cp build.log $GITHUB_WORKSPACE/artifact/ 2>/dev/null || true
          cp out/.config $GITHUB_WORKSPACE/artifact/kernel_config.txt 2>/dev/null || true

          # Create install script
          cat > $GITHUB_WORKSPACE/artifact/install_wifi.sh << 'INSTALL'
          #!/system/bin/sh
          # Run as root: su -c "sh /sdcard/install_wifi.sh"
          MODULE_DIR="/vendor/lib/modules"
          FW_DIR="/vendor/firmware/ath9k_htc"

          echo "=== Installing NetHunter WiFi modules ==="
          mount -o remount,rw /vendor 2>/dev/null || true

          mkdir -p "$MODULE_DIR"
          mkdir -p "$FW_DIR"

          # Copy modules
          for mod in cfg80211.ko mac80211.ko ath_common.ko ath9k_hw.ko ath9k_common.ko ath9k_htc.ko; do
            if [ -f "/sdcard/nethunter_modules/$mod" ]; then
              cp "/sdcard/nethunter_modules/$mod" "$MODULE_DIR/"
              echo "Installed: $mod"
            fi
          done

          # Copy firmware
          if [ -f "/sdcard/nethunter_modules/htc_9271-1.4.0.fw" ]; then
            cp "/sdcard/nethunter_modules/htc_9271-1.4.0.fw" "$FW_DIR/"
            echo "Installed: AR9271 firmware"
          fi

          # Load modules in order
          echo "=== Loading modules ==="
          insmod "$MODULE_DIR/cfg80211.ko" 2>/dev/null && echo "Loaded: cfg80211" || echo "Failed: cfg80211 (may already be loaded)"
          insmod "$MODULE_DIR/mac80211.ko" 2>/dev/null && echo "Loaded: mac80211" || echo "Failed: mac80211"
          insmod "$MODULE_DIR/ath_common.ko" 2>/dev/null && echo "Loaded: ath_common" || echo "Failed: ath_common"
          insmod "$MODULE_DIR/ath9k_hw.ko" 2>/dev/null && echo "Loaded: ath9k_hw" || echo "Failed: ath9k_hw"
          insmod "$MODULE_DIR/ath9k_common.ko" 2>/dev/null && echo "Loaded: ath9k_common" || echo "Failed: ath9k_common"
          insmod "$MODULE_DIR/ath9k_htc.ko" 2>/dev/null && echo "Loaded: ath9k_htc" || echo "Failed: ath9k_htc"

          echo ""
          echo "=== Checking ==="
          lsmod | grep ath
          dmesg | grep -i ath9k | tail -5
          echo "Done! Plug in AR9271 adapter now."
          INSTALL
          chmod +x $GITHUB_WORKSPACE/artifact/install_wifi.sh

          echo "=== Artifact contents ==="
          find $GITHUB_WORKSPACE/artifact/ -type f | head -30
          echo "WiFi modules:"
          ls -lh $GITHUB_WORKSPACE/artifact/modules/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nethunter-wifi-modules-rmx3830
          path: artifact/
          retention-days: 14

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: |
            kernel/build.log
            kernel/out/.config
          retention-days: 14