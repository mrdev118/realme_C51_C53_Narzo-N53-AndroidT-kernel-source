name: Build NetHunter Kernel - Realme C51

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git bc bison flex libssl-dev \
          make gcc build-essential \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          libncurses-dev libelf-dev \
          python3 python3-pip \
          zip unzip cpio \
          device-tree-compiler

    - name: Clone Clang toolchain
      run: |
        git clone https://gitlab.com/ThankYouMario/android_prebuilts_clang-standalone/ \
          -b 14 --depth=1 clang

    - name: Clone GCC toolchain
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
          -b android10-release --depth=1 toolchain64

    - name: Find defconfig
      run: |
        echo "Available defconfigs:"
        ls arch/arm64/configs/
        # Identify the correct one for C51
        ls arch/arm64/configs/ | grep -i "sprd\|sharkl\|realme\|rmx\|ums"

    - name: Apply NetHunter WiFi config additions
      run: |
        # Find the defconfig — adjust name after checking step above
        DEFCONFIG=$(ls arch/arm64/configs/ | grep -i "sprd_sharkl5pro\|sharkl5pro\|realme" | head -1)
        echo "Using defconfig: $DEFCONFIG"
        echo "DEFCONFIG=$DEFCONFIG" >> $GITHUB_ENV
        
        cat >> arch/arm64/configs/$DEFCONFIG << 'EOF'

        # NetHunter WiFi Stack
        CONFIG_CFG80211=y
        CONFIG_MAC80211=y
        CONFIG_MAC80211_HAS_RC=y
        CONFIG_WLAN=y

        # Atheros AR9271 (your adapter)
        CONFIG_WLAN_VENDOR_ATH=y
        CONFIG_ATH_COMMON=y
        CONFIG_ATH9K_HW=y
        CONFIG_ATH9K_COMMON=y
        CONFIG_ATH9K_COMMON_DEBUG=y
        CONFIG_ATH9K_HTC=y
        CONFIG_ATH9K_HTC_DEBUGFS=y

        # RTL8188 (alternative adapter support)
        CONFIG_WLAN_VENDOR_REALTEK=y

        # Module support (critical — allows .ko loading)
        CONFIG_MODULES=y
        CONFIG_MODULE_UNLOAD=y
        CONFIG_MODULE_FORCE_UNLOAD=y
        CONFIG_MODVERSIONS=y
        CONFIG_MODULE_SRCVERSION_ALL=y

        # USB WiFi firmware loading
        CONFIG_FW_LOADER=y
        CONFIG_FW_LOADER_USER_HELPER=y
        CONFIG_EXTRA_FIRMWARE="htc_9271.fw"
        CONFIG_EXTRA_FIRMWARE_DIR="/lib/firmware"

        # USB networking base (already in your kernel but reinforce)
        CONFIG_USB_USBNET=y
        CONFIG_USB_NET_CDCETHER=y

        # 802.11 injection support
        CONFIG_MAC80211_MESH=y
        CONFIG_CFG80211_WEXT=y
        EOF
        
        echo "NetHunter config applied to $DEFCONFIG"

    - name: Set build environment
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "SUBARCH=arm64" >> $GITHUB_ENV
        echo "CROSS_COMPILE=$(pwd)/toolchain64/bin/aarch64-linux-android-" >> $GITHUB_ENV
        echo "CC=$(pwd)/clang/bin/clang" >> $GITHUB_ENV
        echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV

    - name: Build kernel
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=$(pwd)/toolchain64/bin/aarch64-linux-android-
        export CC=$(pwd)/clang/bin/clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        
        # Load defconfig
        make O=out ARCH=arm64 ${{ env.DEFCONFIG }}
        
        # Build
        make O=out ARCH=arm64 \
          CC=$(pwd)/clang/bin/clang \
          CROSS_COMPILE=$(pwd)/toolchain64/bin/aarch64-linux-android- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          -j$(nproc) 2>&1 | tee build.log
        
        echo "Build completed"
        ls out/arch/arm64/boot/

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-nethunter-rmx3830
        path: |
          out/arch/arm64/boot/Image.gz*
          out/arch/arm64/boot/Image*
          build.log
        retention-days: 7

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-failure
        path: build.log
        retention-days: 7
