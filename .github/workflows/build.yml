name: Build NetHunter Kernel - Realme C51

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Realme kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git bc bison flex libssl-dev \
            make gcc build-essential \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libncurses-dev libelf-dev \
            python3 python3-pip \
            zip unzip cpio \
            device-tree-compiler

      - name: Clone Clang toolchain
        run: |
          git clone https://gitlab.com/ThankYouMario/android_prebuilts_clang-standalone/ \
            -b 14 --depth=1 clang

      - name: Confirm defconfig exists
        run: |
          echo "=== Available defconfigs ==="
          ls arch/arm64/configs/
          echo ""
          echo "=== Checking for sprd_gki_defconfig ==="
          ls arch/arm64/configs/sprd_gki_defconfig && echo "FOUND" || echo "NOT FOUND - check ls output above"

      - name: Apply NetHunter additions
        run: |
          cat >> arch/arm64/configs/sprd_gki_defconfig << 'EOF'

          # Fix Android KABI size alignment by enabling vendor/OEM data array
          CONFIG_ANDROID_VENDOR_OEM_DATA=y

          # NetHunter WiFi drivers - as modules to keep Image size near stock
          CONFIG_CFG80211=m
          CONFIG_MAC80211=m
          CONFIG_MAC80211_HAS_RC=y
          CONFIG_WLAN=y
          CONFIG_WLAN_VENDOR_ATH=y
          CONFIG_ATH_COMMON=m
          CONFIG_ATH9K_HW=m
          CONFIG_ATH9K_COMMON=m
          CONFIG_ATH9K_HTC=m
          CONFIG_WLAN_VENDOR_REALTEK=y
          CONFIG_MAC80211_MESH=y
          CONFIG_CFG80211_WEXT=y

          # Module loading - disable sig checks
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          # CONFIG_MODULE_SIG is not set
          # CONFIG_MODULE_SIG_FORCE is not set
          # CONFIG_MODULE_SIG_PROTECT is not set

          # USB
          CONFIG_USB_USBNET=y
          CONFIG_USB_NET_CDCETHER=y
          CONFIG_FW_LOADER_USER_HELPER=y
          EOF

      - name: Build kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=$(pwd)/clang/bin:$PATH

          make O=out ARCH=arm64 sprd_gki_defconfig

          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1 \
            KCFLAGS="-Wno-error" \
            -j$(nproc) 2>&1 | tee build.log

          echo "=== Image size (stock was 47MB) ==="
          ls -lh out/arch/arm64/boot/Image

          echo "=== Vermagic ==="
          strings out/arch/arm64/boot/Image | grep "5.15"

      - name: Collect artifacts
        run: |
          mkdir -p artifact
          cp out/arch/arm64/boot/Image artifact/
          find out/ -name "*.ko" -exec cp {} artifact/ \;
          cp build.log artifact/
          ls -lh artifact/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-nethunter-rmx3830
          path: artifact/
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build.log
          retention-days: 7
